services:
  - type: web
    name: myqrro-bot-backup
    env: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: WEBHOOK_SECRET
        sync: false
      - key: OWNER_ID
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: WEBHOOK_HOST
        sync: false          # Set to your Render URL
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
